const GAS_URL = "https://script.google.com/macros/s/AKfycbxwK9OipKfnJeCbf62rrLgmlIQqu4r2-0K2NbIkbUvdhYuwp5xjvBGVEGjNvNx7z1iNHw/exec";
let syncing=false;
let lastSyncTime="";

async function cloudLoad(){
  if(!GAS_URL){updSync("⚠️ ยังไม่ได้ตั้ง GAS_URL","warn");return [];}
  try{
    updSync("☁️ กำลังโหลด...","info");
    const r=await fetch(GAS_URL,{redirect:"follow"});
    if(!r.ok)throw new Error("HTTP "+r.status);
    const j=await r.json();
    if(j.ok){
      const recs=j.data||j.records||[];
      lastSyncTime=new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
      updSync("☁️ โหลดสำเร็จ "+recs.length+" ราย ("+lastSyncTime+")","ok");
      return recs;
    }
    throw new Error(j.error||"Unknown error");
  }catch(e){
    console.log("cloudLoad err:",e);
    updSync("⚠️ โหลดไม่ได้: "+e.message,"warn");
    return [];
  }
}

async function cloudSave(records){
  if(!GAS_URL){updSync("⚠️ ยังไม่ได้ตั้ง GAS_URL","warn");return;}
  syncing=true;updSync("☁️ กำลัง sync...","info");
  try{
    const r=await fetch(GAS_URL,{
      method:"POST",
      redirect:"follow",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"sync",records:records})
    });
    const j=await r.json();
    if(!j.ok)throw new Error(j.error||"Save failed");
    syncing=false;
    lastSyncTime=new Date().toLocaleTimeString("th-TH",{hour:"2-digit",minute:"2-digit"});
    updSync("✅ sync สำเร็จ ("+lastSyncTime+")","ok");
  }catch(e){
    syncing=false;
    console.log("cloudSave err:",e);
    updSync("⚠️ sync ไม่ได้: "+e.message,"warn");
  }
}

async function cloudUpsert(record){
  if(!GAS_URL)return;
  try{
    await fetch(GAS_URL,{
      method:"POST",redirect:"follow",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"upsert",record:record})
    });
  }catch(e){console.log("cloudUpsert err:",e);}
}

async function cloudDelete(id){
  if(!GAS_URL)return;
  try{
    await fetch(GAS_URL,{
      method:"POST",redirect:"follow",
      headers:{"Content-Type":"text/plain"},
      body:JSON.stringify({action:"delete",id:id})
    });
  }catch(e){console.log("cloudDelete err:",e);}
}

async function cloudRefresh(){
  updSync("☁️ รีเฟรช...","info");
  const cloud=await cloudLoad();
  if(cloud.length){
    const ids=new Set(S.records.map(r=>String(r.id)));
    let added=0;
    cloud.forEach(r=>{if(!ids.has(String(r.id))){S.records.push(r);ids.add(String(r.id));added++;}});
    // อัปเดต records ที่มีอยู่แล้ว (ใช้ cloud version)
    const cloudMap={};cloud.forEach(r=>{cloudMap[String(r.id)]=r;});
    S.records=S.records.map(r=>{const cr=cloudMap[String(r.id)];return cr||r;});
    localStorage.setItem("mra_v5",JSON.stringify(S.records));
    if(added)S.msg="☁️ เพิ่มจาก Cloud: "+added+" ราย (รวม "+S.records.length+" ราย)";
    else S.msg="☁️ ข้อมูลอัปเดตแล้ว ("+S.records.length+" ราย)";
    ren();
  }
}

function updSync(txt,type){
  const el=document.getElementById("syncSt");

  if(syncing&&!txt){el.textContent="☁️ กำลัง sync...";el.style.color="#2563eb";return;}
  el.textContent=txt||"";
  el.style.color=type==="ok"?"#16a34a":type==="warn"?"#dc2626":"#2563eb";
}

    h("div",null,"Sum Score: ",h("b",null,String(totalSum))," คะแนน"),
    h("div",null,"Full Score: ",h("b",null,String(totalFull))," คะแนน"),
    h("div",null,"ผลการตรวจสอบความสมบูรณ์: ",h("b",{style:{color:avgPct>=80?"#16a34a":"#dc2626"}},avgPct+"%")),
  ));

  app.appendChild(h("div",{style:{display:"flex",gap:"4px",justifyContent:"center",margin:"6px 0 16px"}},
    h("button",{className:"btn btn-p",onClick:()=>{S.tab="form";ren();}},"← กลับบันทึก"),
    h("button",{className:"btn btn-o",onClick:()=>window.print()},"🖨 พิมพ์หน้านี้"),
    h("button",{className:"btn btn-o",onClick:()=>{if(confirm("ลบข้อมูลทั้งหมด?")){S.records=[];sv();ren();}}},"🗑 ล้าง"),
  ));
}

function rP(app){
  const p=S.pop;const row=R.find(r=>r.no===p.rn);const sub=row?.s.find(x=>x.c===p.c);
  if(!sub){S.pop=null;return;}const cv=gV(p.rn,p.c);const canNA=!!CNA[p.rn+"-"+p.c];
  app.appendChild(h("div",{className:"pov",onClick:()=>{S.pop=null;ren();}}));
  const px=Math.min(Math.max(4,p.x-150),window.innerWidth-350),py=Math.min(p.y,window.innerHeight-260);
  const btns=h("div",{style:{display:"flex",gap:"4px",justifyContent:"center",flexWrap:"wrap"}},
    h("button",{className:"pb ps"+(cv===1?" sl":""),onClick:()=>{S.sc[p.rn+"-"+p.c]=1;S.pop=null;ren();}},"✓ ผ่าน(1)"),
    h("button",{className:"pb fl"+(cv===0?" sl":""),onClick:()=>{S.sc[p.rn+"-"+p.c]=0;S.pop=null;ren();}},"✗ ไม่ผ่าน(0)"));
  if(canNA)btns.appendChild(h("button",{className:"pb pna"+(cv==="N"?" sl":""),onClick:()=>{S.sc[p.rn+"-"+p.c]="N";S.pop=null;ren();}},"N/A"));
  const popup=h("div",{className:"pop",style:{left:px+"px",top:py+"px"}},h("div",{style:{fontSize:"8.5px",color:"#94a3b8"}},row.nm+" → ข้อ"+p.c),h("h4",null,"📋 "+sub.l),h("div",{className:"det"},sub.d),btns);
  if(row.hB)popup.appendChild(h("div",{className:"bns"},"💡 "+row.bD));
  if(canNA)popup.appendChild(h("div",{style:{marginTop:"3px",padding:"2px 4px",background:"#fefce8",borderRadius:"3px",fontSize:"9px",color:"#854d0e"}},"💡 ข้อนี้ NA ได้ตามเกณฑ์"));
  app.appendChild(popup);
}

// ===== SAVE WITH DATA =====
function saveWithData(){
  if(!S.records.length){alert("ไม่มีข้อมูลให้บันทึก");return;}
  let src=document.documentElement.outerHTML;
  const dataStr="const _ED="+JSON.stringify(S.records)+";";
  src=src.replace(/const _ED=\[.*?\];/,"const _ED=[];");
  src=src.replace("const _ED=[];",dataStr);
  const blob=new Blob(["<!DOCTYPE html><html lang=\"th\">"+src+"</html>"],{type:"text/html;charset=utf-8"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download="MRA-Pro-Audit.html";
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  alert("✅ บันทึกไฟล์พร้อมข้อมูล "+S.records.length+" ราย เรียบร้อย\nเอาไฟล์นี้ไปเปิดเครื่องไหนก็มีข้อมูลพร้อมใช้");
}

ren();
if(GAS_URL){
  (async()=>{
    try{
      const cloud=await cloudLoad();
      if(cloud.length){
        const ids=new Set(S.records.map(r=>String(r.id)));
        let added=0;
        cloud.forEach(r=>{if(!ids.has(String(r.id))){S.records.push(r);ids.add(String(r.id));added++;}});
        if(added){
          localStorage.setItem("mra_v5",JSON.stringify(S.records));
          S.msg="☁️ โหลดจาก Cloud: เพิ่ม "+added+" ราย (รวม "+S.records.length+" ราย)";
          ren();
        }
      }
    }catch(e){updSync("⚠️ offline","warn");}
  })();
} else {
  updSync("⚠️ ยังไม่ได้ตั้ง GAS_URL","warn");
}
